<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇小游戏</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body>
    <div class="game-wrapper">
        <h1 class="game-title">贪吃蛇</h1>

        <!-- 开始界面 -->
        <div class="start-screen" id="startScreen">
            <div class="start-content">
                <div class="mascot">🐍</div>
                <p class="start-text">准备好开始了吗？</p>
                <button class="btn btn-primary" id="startBtn">开始游戏</button>
            </div>
        </div>

        <!-- 游戏主界面 -->
        <div class="game-container" id="gameContainer" style="display: none;">
            <div class="score-panel">
                <div class="score-item">
                    <span class="score-label">分数</span>
                    <span class="score-value" id="score">0</span>
                </div>
                <div class="score-item">
                    <span class="score-label">最高分</span>
                    <span class="score-value" id="highScore">0</span>
                </div>
            </div>

            <div class="canvas-wrapper">
                <canvas id="gameCanvas" width="400" height="400"></canvas>

                <!-- 暂停遮罩 -->
                <div class="overlay" id="pauseOverlay" style="display: none;">
                    <div class="overlay-content">
                        <p>游戏暂停</p>
                        <button class="btn btn-secondary" id="resumeBtn">继续</button>
                    </div>
                </div>

                <!-- 游戏结束遮罩 -->
                <div class="overlay" id="gameOverOverlay" style="display: none;">
                    <div class="overlay-content">
                        <p class="game-over-title">游戏结束</p>
                        <p class="final-score">得分: <span id="finalScore">0</span></p>
                        <button class="btn btn-primary" id="restartBtn">再来一局</button>
                    </div>
                </div>
            </div>

            <div class="control-panel">
                <button class="btn btn-small" id="pauseBtn">暂停</button>
                <button class="btn btn-small" id="restartBtn2">重开</button>
            </div>

            <div class="instructions">
                <p>使用 <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> 或 <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 控制方向</p>
                <p class="shortcut-hint">按 <kbd>Space</kbd> 暂停/继续</p>
            </div>
        </div>

        <!-- 历史记录面板 -->
        <div class="history-panel" id="historyPanel">
            <h3>历史记录</h3>
            <ul class="history-list" id="historyList">
                <li class="empty-history">暂无记录</li>
            </ul>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="state.js"></script>
    <script src="food.js"></script>
    <script src="rules.js"></script>
    <script src="renderer.js"></script>
    <script src="input.js"></script>
    <script src="ui.js"></script>
    <script src="engine.js"></script>
    <script src="script.js"></script>
</body>
</html>
