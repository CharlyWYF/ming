<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: "Microsoft YaHei", sans-serif;
            overflow: hidden;
        }

        h1 {
            color: #e94560;
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
            animation: titlePulse 2s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { text-shadow: 0 0 20px rgba(233, 69, 96, 0.5); }
            50% { text-shadow: 0 0 40px rgba(233, 69, 96, 0.8); }
        }

        .game-container {
            position: relative;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
        }

        canvas {
            display: block;
            border-radius: 10px;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a1a1a 100%);
            border: 3px solid #e94560;
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px 20px;
            background: rgba(233, 69, 96, 0.1);
            border-radius: 10px;
            border: 2px solid #e94560;
        }

        .score, .high-score {
            color: #fff;
            font-size: 1.2rem;
        }

        .score span, .high-score span {
            color: #e94560;
            font-weight: bold;
            font-size: 1.5rem;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            display: none;
            border: 3px solid #e94560;
            box-shadow: 0 0 50px rgba(233, 69, 96, 0.5);
        }

        .game-over h2 {
            color: #e94560;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .game-over p {
            color: #fff;
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        .btn {
            background: linear-gradient(135deg, #e94560, #c73e54);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            text-transform: uppercase;
            font-weight: bold;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.8);
        }

        .instructions {
            color: #888;
            margin-top: 20px;
            text-align: center;
        }

        .instructions kbd {
            background: #333;
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid #555;
            color: #e94560;
        }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇</h1>
    <div class="game-container">
        <div class="score-board">
            <div class="score">分数: <span id="score">0</span></div>
            <div class="high-score">最高分: <span id="highScore">0</span></div>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="game-over" id="gameOver">
            <h2>游戏结束!</h2>
            <p>最终得分: <span id="finalScore">0</span></p>
            <button class="btn" onclick="restartGame()">再来一局</button>
        </div>
    </div>
    <div class="instructions">
        使用 <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> 控制蛇的方向
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const gameOverElement = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = { x: 0, y: 0 };
        let dx = 0;
        let dy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let isGameRunning = false;

        highScoreElement.textContent = highScore;

        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 10, y: 11 },
                { x: 10, y: 12 }
            ];
            dx = 0;
            dy = -1;
            score = 0;
            scoreElement.textContent = score;
            gameOverElement.style.display = 'none';
            spawnFood();
            isGameRunning = true;

            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(gameUpdate, 100);
        }

        function spawnFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);

            for (let part of snake) {
                if (part.x === food.x && part.y === food.y) {
                    spawnFood();
                    break;
                }
            }
        }

        function gameUpdate() {
            if (!isGameRunning) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                spawnFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格
            ctx.strokeStyle = 'rgba(233, 69, 96, 0.1)';
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 绘制蛇
            for (let i = 0; i < snake.length; i++) {
                const part = snake[i];
                const gradient = ctx.createRadialGradient(
                    part.x * gridSize + gridSize / 2,
                    part.y * gridSize + gridSize / 2,
                    0,
                    part.x * gridSize + gridSize / 2,
                    part.y * gridSize + gridSize / 2,
                    gridSize / 2
                );

                if (i === 0) {
                    gradient.addColorStop(0, '#ff6b6b');
                    gradient.addColorStop(1, '#e94560');
                } else {
                    gradient.addColorStop(0, '#e94560');
                    gradient.addColorStop(1, '#c73e54');
                }

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(
                    part.x * gridSize + 1,
                    part.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    5
                );
                ctx.fill();

                // 蛇眼睛
                if (i === 0) {
                    ctx.fillStyle = '#fff';
                    const eyeSize = 4;
                    const eyeOffset = 5;

                    if (dx === 1) {
                        ctx.beginPath();
                        ctx.arc(part.x * gridSize + gridSize - eyeOffset, part.y * gridSize + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(part.x * gridSize + gridSize - eyeOffset, part.y * gridSize + gridSize - eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (dx === -1) {
                        ctx.beginPath();
                        ctx.arc(part.x * gridSize + eyeOffset, part.y * gridSize + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(part.x * gridSize + eyeOffset, part.y * gridSize + gridSize - eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (dy === -1) {
                        ctx.beginPath();
                        ctx.arc(part.x * gridSize + eyeOffset, part.y * gridSize + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(part.x * gridSize + gridSize - eyeOffset, part.y * gridSize + eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.beginPath();
                        ctx.arc(part.x * gridSize + eyeOffset, part.y * gridSize + gridSize - eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.arc(part.x * gridSize + gridSize - eyeOffset, part.y * gridSize + gridSize - eyeOffset, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            // 绘制食物
            const foodGradient = ctx.createRadialGradient(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                0,
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2
            );
            foodGradient.addColorStop(0, '#ffeb3b');
            foodGradient.addColorStop(1, '#ff9800');

            ctx.fillStyle = foodGradient;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();

            // 食物闪烁效果
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 3,
                food.y * gridSize + gridSize / 3,
                3,
                0,
                Math.PI * 2
            );
            ctx.fill();
        }

        function gameOver() {
            isGameRunning = false;
            clearInterval(gameLoop);

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreElement.textContent = highScore;
            }

            finalScoreElement.textContent = score;
            gameOverElement.style.display = 'block';
        }

        function restartGame() {
            initGame();
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();

            if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', 'w', 'a', 's', 'd'].includes(key)) {
                e.preventDefault();
            }

            switch (key) {
                case 'arrowup':
                case 'w':
                    if (dy !== 1) { dx = 0; dy = -1; }
                    break;
                case 'arrowdown':
                case 's':
                    if (dy !== -1) { dx = 0; dy = 1; }
                    break;
                case 'arrowleft':
                case 'a':
                    if (dx !== 1) { dx = -1; dy = 0; }
                    break;
                case 'arrowright':
                case 'd':
                    if (dx !== -1) { dx = 1; dy = 0; }
                    break;
            }
        });

        // 移动端触摸控制
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 30 && dx !== -1) { dx = 1; dy = 0; }
                else if (diffX < -30 && dx !== 1) { dx = -1; dy = 0; }
            } else {
                if (diffY > 30 && dy !== -1) { dx = 0; dy = 1; }
                else if (diffY < -30 && dy !== 1) { dx = 0; dy = -1; }
            }

            e.preventDefault();
        }, { passive: false });

        // 初始化游戏
        initGame();
    </script>
</body>
</html>
